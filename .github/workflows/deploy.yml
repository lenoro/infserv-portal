name: Deploy infserv portal

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t infserv-portal:latest .

      - name: Export image as tar.gz
        run: docker save infserv-portal:latest | gzip > infserv-portal.tar.gz

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Copy image to VPS
        run: scp -i ~/.ssh/deploy_key infserv-portal.tar.gz ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/infserv-portal.tar.gz

      - name: Load and restart on VPS
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            set -e
            docker load < /tmp/infserv-portal.tar.gz
            cd /opt/infserv-portal
            docker compose up -d --force-recreate
            docker image prune -f
            rm -f /tmp/infserv-portal.tar.gz
          EOF
